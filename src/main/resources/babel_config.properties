# === babel-canvas configuration =============================================
# Every value here can be overridden on the command line, e.g.
#   java -jar babel-canvas.jar babel.port=6000 babel.interface=en0
# The same key=value override mechanism is how the babel-canvas-experiments
# harness sweeps protocol parameters across runs.
# ============================================================================

#### Process-wide bind (babel.*) — defaults a protocol's channel uses unless it
#### defines its own namespaced address/interface/port. HyParView binds its
#### membership channel here; eager-push gossip derives its own port from this
#### (see EagerPushGossipBroadcast.PeerAddressResolution below).
# TCP port HyParView (membership) listens on. To run SEVERAL nodes on ONE machine,
# space their ports by >= 10: eager-push binds babel.port+1 in the default 'offset'
# resolution mode, so adjacent ports (6000, 6001) would collide across nodes.
babel.port=6000
# Network interface to bind/announce on (e.g. en0 on macOS, eth0 on Linux). If
# left unset, the sole reachable physical interface is auto-detected (see
# InterfaceToIp); set this only if the machine has several and the wrong one is picked.
#babel.interface=en0
# Bind/announce IP — overrides interface auto-detection. NO loopback default: if no
# reachable interface can be auto-detected you must set this or babel.interface. Use
# 127.0.0.1 to run several nodes on one disconnected machine.
#babel.address=127.0.0.1

#### Discovery — REQUIRED to enable multicast LAN auto-discovery of peers. Without
#### this key babel-core loads NO discovery protocol, the HyParView DiscoverableProtocol
#### is never wired, and nodes connect only via the HyParView.contact fallback below.
#### MulticastDiscoveryProtocol joins group 233.138.122.123 (multicast port 1025) and
#### reuses babel.interface/babel.address.
babel.discovery pt.unl.fct.di.novasys.babel.core.protocols.discovery.MulticastDiscoveryProtocol
# Discovery unicast socket port — per process. To run SEVERAL discovery-enabled nodes
# on ONE machine, give each a DISTINCT value (default 1026; the 2nd node otherwise
# dies with "BindException: Address already in use"). Keep the multicast rendezvous
# port (babel.discovery.multicast.port, 1025) identical across nodes.
#babel.discovery.unicast.port=1026

#### Membership — HyParView (slot 2500). Partial-view overlay: a small active view
#### (the gossip neighbours) + a larger passive view of fallbacks refreshed by shuffles.
# Bootstrap. LEAVE COMMENTED OUT for normal auto-discovery (this node probes the LAN
# and answers probes). 'none' = first node: don't probe, but still answer probes so
# joiners discover me. 'host:port' = seed directly from an existing node.
#HyParView.contact=none
HyParView.ActiveView=4
HyParView.PassiveView=7
HyParView.ARWL=4
HyParView.PRWL=2
HyParView.ShufflePeriod=2000
HyParView.kActive=2
HyParView.kPassive=3

#### Dissemination — eager-push gossip (slot 2400). Forwards each paint op to a
#### random fanout of active-view neighbours; receivers re-broadcast novel ops.
EagerPushGossipBroadcast.Fanout=4
EagerPushGossipBroadcast.DeliveredTimeout=600000
# Peer-address resolution: how a peer's gossip port is derived from its membership
# (HyParView) port. 'offset' = membership port + PortOffset (default +1) — the right
# choice for one-process-per-host deploys (containers, cluster) and for local nodes
# spaced >= 10 apart. 'fixed' = every peer on PeerPort. 'shared' = reuse HyParView's
# channel (no second port; head-of-line blocking — fine for small ops).
EagerPushGossipBroadcast.PeerAddressResolution=offset
EagerPushGossipBroadcast.PortOffset=1
# Anti-entropy hooks on the gossip protocol. Set true only together with
# canvas.antientropy.enabled below (Main keeps the two in sync automatically).
#EagerPushGossipBroadcast.SupportAntiEntropy=false

#### Reconciliation — bloom-filter anti-entropy (slot 1900). OPTIONAL; recovers paint
#### ops that gossip missed. Off by default. Enable via canvas.antientropy.enabled
#### (Main then turns on EagerPushGossipBroadcast.SupportAntiEntropy and gives
#### AntiEntropy its own channel at babel.port+2).
#AntiEntropy.Period=60000
#AntiEntropy.GCTimeout=600000
#AntiEntropy.GracePeriod=90000

#### Canvas application (slot 300) — params namespaced 'canvas.'
# Shared grid dimensions (cells). Must match across all nodes.
canvas.width=48
canvas.height=48
# Web UI: an embedded HTTP server rendering the canvas + this node's neighbours.
canvas.ui.enabled=true
# UI port. Defaults to babel.port + 2000 (so local nodes get distinct UI ports
# automatically); set explicitly to override.
#canvas.ui.port=8000
# Snapshot sync: on joining, request the current canvas from one neighbour over
# HyParView's channel so a late joiner sees existing art immediately.
canvas.snapshot.sync=true
# Periodic convergence digest written to the telemetry log (ms; <= 0 disables).
canvas.digest.interval=5000

#### Headless workload driver — used by the experiments harness, off for interactive
#### demos. When enabled, this node paints random cells at a fixed rate (no UI needed).
canvas.workload.enabled=false
# Paint operations per second this node generates.
canvas.workload.rate=2
# How long to keep painting (ms); <= 0 = until the process is stopped.
canvas.workload.duration=0
# Delay before the first painted op (ms) — lets the overlay form first.
canvas.workload.startDelay=5000
